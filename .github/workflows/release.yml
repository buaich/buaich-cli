name: Release #workflow name

# trigger condition
on:
  push:
    branches:
      - main #When codes are pushed into main branch

# prevent from concurrency
concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

permissions:
  contents: write #allow amend depot code
  pull-requests: write #allow create or amend PR

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{secrets.GITHUB_TOKEN}}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run changesets action
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm ci:publish
          commit: "chore: update versions"
          title: "chore: update versions"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Resolve @buaich/cli release version
        id: cli_release
        run: |
          node -e 'const fs=require("node:fs"); const pkg=JSON.parse(fs.readFileSync("packages/@buaich/cli/package.json","utf8")); if(!pkg.version){throw new Error("Missing version in packages/@buaich/cli/package.json");} fs.appendFileSync(process.env.GITHUB_OUTPUT, "version="+pkg.version+"\n");'

      - name: Create GitHub release for @buaich/cli
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.cli_release.outputs.version }}
          name: v${{ steps.cli_release.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
